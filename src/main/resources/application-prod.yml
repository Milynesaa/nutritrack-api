spring:
  application:
    name: nutritrack-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nutritrack}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:nutritrack@gmail.com}
    password: ${SMTP_PASSWORD:elce pxut ymqc qyrd}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  ai:
    huggingface:
      api-key: ${HUGGINGFACE_API_KEY:YOUR_HUGGINGFACE_API_KEY_HERE}
      chat:
        options:
          model: Qwen/Qwen2.5-7B-Instruct
          temperature: 0.7
          max-tokens: 1000

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:make up your mind make up your soul}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

app:
  frontend:
    reset-password-url: ${FRONTEND_RESET_PASSWORD_URL:http://localhost:3000/reset-password}

logging:
  level:
    com.nutritrack: INFO
    org.springframework.security: WARN
    org.hibernate: WARN

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always